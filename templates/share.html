<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать файл - Nimbus File</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { 
            --bg: #0f0f0f; 
            --card: rgba(30, 30, 30, 0.95); 
            --text: #e2e8f0; 
            --border: #4a5568; 
            --primary: #63b3ed; 
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --hover: #4299e1;
            --cell-bg: rgba(255,255,255,0.05);
            --success: #48bb78;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }
        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        .floating-cell {
            position: absolute;
            background: var(--cell-bg);
            border: 1px solid var(--border);
            animation: float 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
            border-radius: 8px;
        }
        .floating-cell:nth-child(1) { width: 60px; height: 60px; top: 10%; left: 10%; animation-delay: 0s; }
        .floating-cell:nth-child(2) { width: 40px; height: 40px; top: 20%; right: 15%; animation-delay: 1s; }
        .floating-cell:nth-child(3) { width: 80px; height: 80px; bottom: 15%; left: 20%; animation-delay: 2s; }
        .floating-cell:nth-child(4) { width: 50px; height: 50px; bottom: 25%; right: 25%; animation-delay: 3s; }
        .floating-cell:nth-child(5) { width: 70px; height: 70px; top: 50%; left: 5%; animation-delay: 4s; }
        .floating-cell:nth-child(6) { width: 45px; height: 45px; top: 60%; right: 10%; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
            opacity: 0.6;
        }
        .particle:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 15%; left: 25%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 25%; left: 45%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 35%; left: 65%; animation-delay: 6s; }
        .particle:nth-child(5) { top: 45%; left: 85%; animation-delay: 8s; }
        @keyframes particleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            50% { transform: translate(20px, -30px) scale(1.5); }
        }
        .card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 480px;
            width: 90%;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            animation: cardAppear 0.5s ease-out;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .logo svg {
            width: 36px;
            height: 36px;
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        .subtitle {
            color: var(--text);
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }
        .file-icon-container {
            width: 100px;
            height: 100px;
            margin: 1.5rem auto;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 2s ease-in-out infinite;
        }
        .file-icon {
            width: 56px;
            height: 56px;
            color: var(--primary);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .file-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            word-break: break-word;
            line-height: 1.4;
        }
        .file-size {
            color: var(--text);
            opacity: 0.6;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .encryption-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            background: rgba(72, 187, 120, 0.15);
            color: var(--success);
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .encryption-badge svg {
            width: 16px;
            height: 16px;
        }
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            justify-content: center;
        }
        .btn svg {
            width: 22px;
            height: 22px;
        }
        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        .btn-primary:active {
            transform: translateY(-1px);
        }
        .loading {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
            opacity: 0.7;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .back-link svg {
            width: 18px;
            height: 18px;
        }
        .back-link:hover {
            opacity: 1;
            transform: translateX(-4px);
        }
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.5rem;
            }
            .file-icon-container {
                width: 80px;
                height: 80px;
            }
            .file-icon {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
            </svg>
            Nimbus File
        </div>
        <p class="subtitle">Файл готов к скачиванию</p>
        
        <div class="file-icon-container">
            <svg class="file-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                <polyline points="13 2 13 9 20 9"/>
            </svg>
        </div>
        
        <div class="file-name">{{ file_name }}</div>
        <div class="file-size">{{ "%.2f" % (file_size / 1024 / 1024) }} MB</div>
        
        <div class="encryption-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Зашифровано AES-256
        </div>
        
        <a href="/api/share/{{ share_id }}" class="btn btn-primary" id="download-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            <span>Скачать файл</span>
        </a>
        
        <a href="/" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
            </svg>
            На главную
        </a>
    </div>

    <script>
        const btn = document.getElementById('download-btn');
        btn.addEventListener('click', () => {
            btn.innerHTML = `
                <span class="loading"></span>
                <span>Загрузка...</span>
            `;
            setTimeout(() => {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Скачать файл</span>
                `;
            }, 2000);
        });
    </script>
</body>
</html>
