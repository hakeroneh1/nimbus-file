<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nimbus File</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { 
            --bg: #0f0f0f; 
            --card: rgba(30, 30, 30, 0.95); 
            --text: #e2e8f0; 
            --border: #4a5568; 
            --primary: #63b3ed; 
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --hover: #4299e1;
            --cell-bg: rgba(255,255,255,0.05);
            --success: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh; 
            overflow-x: hidden;
            position: relative;
        }
        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            opacity: 0.3;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }
        .floating-cell {
            position: absolute;
            background: var(--cell-bg);
            border: 1px solid var(--border);
            animation: float 6s ease-in-out infinite;
            backdrop-filter: blur(10px);
            border-radius: 8px;
        }
        .floating-cell:nth-child(1) { width: 60px; height: 60px; top: 10%; left: 10%; animation-delay: 0s; }
        .floating-cell:nth-child(2) { width: 40px; height: 40px; top: 20%; right: 15%; animation-delay: 1s; }
        .floating-cell:nth-child(3) { width: 80px; height: 80px; bottom: 15%; left: 20%; animation-delay: 2s; }
        .floating-cell:nth-child(4) { width: 50px; height: 50px; bottom: 25%; right: 25%; animation-delay: 3s; }
        .floating-cell:nth-child(5) { width: 70px; height: 70px; top: 50%; left: 5%; animation-delay: 4s; }
        .floating-cell:nth-child(6) { width: 45px; height: 45px; top: 60%; right: 10%; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
            opacity: 0.6;
        }
        .particle:nth-child(1) { top: 5%; left: 5%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 15%; left: 25%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 25%; left: 45%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 35%; left: 65%; animation-delay: 6s; }
        .particle:nth-child(5) { top: 45%; left: 85%; animation-delay: 8s; }
        .particle:nth-child(6) { top: 55%; left: 15%; animation-delay: 10s; }
        .particle:nth-child(7) { top: 65%; left: 35%; animation-delay: 12s; }
        .particle:nth-child(8) { top: 75%; left: 55%; animation-delay: 14s; }
        .particle:nth-child(9) { top: 85%; left: 75%; animation-delay: 16s; }
        @keyframes particleFloat {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            50% { transform: translate(20px, -30px) scale(1.5); }
        }
        .nav { 
            background: var(--card); 
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            animation: slideDown 0.5s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .nav-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .logo { 
            font-size: 1.4rem; 
            font-weight: bold; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
        .logo svg {
            width: 28px;
            height: 28px;
            animation: logoSpin 10s linear infinite;
        }
        @keyframes logoSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .nav-actions { 
            display: flex; 
            gap: 0.75rem; 
            align-items: center; 
            flex-wrap: wrap;
        }
        .btn { 
            padding: 0.6rem 1.1rem; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 0.85rem; 
            transition: all 0.3s; 
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn svg {
            width: 16px;
            height: 16px;
        }
        .btn-primary { 
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        .btn-outline { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text); 
            backdrop-filter: blur(10px);
        }
        .btn-outline:hover { 
            background: var(--card);
            transform: translateY(-2px);
        }
        .btn-icon {
            padding: 0.5rem;
            min-width: 36px;
            justify-content: center;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 1.5rem; 
        }
        .auth-card { 
            max-width: 420px; 
            margin: 80px auto; 
            background: var(--card); 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.2); 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            animation: cardAppear 0.5s ease-out;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-card h2 { 
            margin-bottom: 0.5rem; 
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            font-size: 1.8rem;
        }
        .auth-card .subtitle {
            text-align: center;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .input-group { 
            margin-bottom: 1rem; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: var(--text);
            font-weight: 500;
            font-size: 0.9rem;
        }
        input, textarea { 
            width: 100%; 
            padding: 0.85rem; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: var(--card); 
            color: var(--text); 
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
        }
        input:focus { 
            outline: none; 
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .file-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 1rem; 
            margin-top: 1rem; 
        }
        .file-card { 
            background: var(--card); 
            padding: 1.1rem; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            cursor: pointer; 
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
            animation: fileCardAppear 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }
        .file-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .file-card:hover::before {
            transform: scaleX(1);
        }
        @keyframes fileCardAppear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .file-card:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            border-color: var(--primary);
        }
        .file-icon { 
            width: 48px;
            height: 48px;
            margin-bottom: 0.75rem; 
            transition: transform 0.3s;
        }
        .file-card:hover .file-icon {
            transform: scale(1.1) rotate(5deg);
        }
        .file-name { 
            font-weight: 600; 
            margin-bottom: 0.25rem; 
            word-break: break-word; 
            font-size: 0.9rem;
            line-height: 1.3;
            max-height: 2.6em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .file-size { 
            font-size: 0.8rem; 
            color: var(--text);
            opacity: 0.6; 
        }
        .breadcrumb { 
            display: flex; 
            gap: 0.4rem; 
            margin: 1rem 0; 
            padding: 0.75rem 0; 
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            align-items: center;
        }
        .breadcrumb-item { 
            color: var(--primary); 
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .breadcrumb-item:hover { 
            background: rgba(102, 126, 234, 0.15);
        }
        .breadcrumb-separator {
            opacity: 0.5;
        }
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(0,0,0,0.7); 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            backdrop-filter: blur(5px);
        }
        .modal.active { 
            display: flex; 
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content { 
            background: var(--card); 
            padding: 2rem; 
            border-radius: 24px; 
            max-width: 500px; 
            width: 90%; 
            max-height: 80vh; 
            overflow-y: auto;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            animation: modalSlide 0.3s ease-out;
        }
        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-actions { 
            display: flex; 
            gap: 0.75rem; 
            margin-top: 1.5rem; 
            flex-wrap: wrap;
        }
        .drop-zone { 
            border: 2px dashed var(--primary); 
            padding: 2.5rem; 
            text-align: center; 
            border-radius: 16px; 
            margin: 1rem 0; 
            cursor: pointer; 
            transition: all 0.3s; 
            background: rgba(102, 126, 234, 0.05);
        }
        .drop-zone:hover { 
            background: rgba(102, 126, 234, 0.12);
            transform: scale(1.02);
            border-color: var(--primary);
        }
        .drop-zone svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            animation: dropBounce 2s ease-in-out infinite;
        }
        @keyframes dropBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .progress { 
            height: 8px; 
            background: var(--border); 
            border-radius: 4px; 
            overflow: hidden; 
            margin: 1rem 0; 
            position: relative;
        }
        .progress-bar { 
            height: 100%; 
            background: var(--primary-gradient); 
            transition: width 0.3s; 
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        .toast { 
            position: fixed; 
            bottom: 2rem; 
            right: 2rem; 
            background: var(--card); 
            padding: 1rem 1.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
            display: none; 
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            z-index: 2000;
            animation: toastSlide 0.3s ease-out;
        }
        @keyframes toastSlide {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.show { 
            display: block;
        }
        .loading { 
            text-align: center; 
            padding: 3rem; 
            color: var(--text);
            opacity: 0.7;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .empty-state { 
            text-align: center; 
            padding: 3rem; 
            color: var(--text);
            opacity: 0.7;
        }
        .empty-state svg { 
            width: 80px;
            height: 80px;
            margin-bottom: 1rem; 
            opacity: 0.5;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .api-key { 
            background: var(--card); 
            padding: 1rem; 
            border-radius: 12px; 
            margin: 0.5rem 0; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            gap: 0.75rem;
        }
        .api-key code { 
            background: rgba(102, 126, 234, 0.15); 
            padding: 0.4rem 0.75rem; 
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
        }
        .theme-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .theme-btn svg {
            width: 20px;
            height: 20px;
        }
        .theme-btn:hover {
            transform: rotate(180deg) scale(1.1);
        }
        .action-btns {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.6rem;
            flex-wrap: wrap;
        }
        .action-btns .btn {
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
        }
        .file-viewer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .file-viewer-overlay.active {
            display: flex;
        }
        .file-viewer-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        .file-viewer-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: var(--card);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .file-viewer-close:hover {
            transform: scale(1.1);
            background: var(--danger);
        }
        .header-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .user-badge svg {
            width: 18px;
            height: 18px;
        }
        .encryption-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.5rem;
            background: rgba(72, 187, 120, 0.15);
            color: var(--success);
            border-radius: 6px;
            font-size: 0.75rem;
            margin-top: 0.3rem;
        }
        .encryption-badge svg {
            width: 12px;
            height: 12px;
        }
        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }
        .github-link:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        .github-link svg {
            width: 20px;
            height: 20px;
        }
        .rename-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) { 
            .nav-content { 
                flex-direction: column; 
                gap: 0.75rem; 
            }
            .logo {
                font-size: 1.2rem;
            }
            .file-grid { 
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
                gap: 0.75rem;
            }
            .file-card {
                padding: 0.9rem;
            }
            .file-icon {
                width: 40px;
                height: 40px;
            }
            .container {
                padding: 1rem;
            }
            .auth-card {
                margin: 40px 1rem;
                padding: 1.5rem;
            }
            .modal-content {
                padding: 1.5rem;
                width: 95%;
            }
            .header-actions {
                width: 100%;
                justify-content: center;
            }
            .nav-actions {
                width: 100%;
                justify-content: center;
            }
            .btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.8rem;
            }
            .btn span {
                display: none;
            }
            .btn-icon span {
                display: inline;
            }
        }
        @media (max-width: 480px) {
            .file-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .file-name {
                font-size: 0.8rem;
            }
            .action-btns {
                gap: 0.3rem;
            }
            .action-btns .btn {
                padding: 0.35rem 0.5rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="floating-cell"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <nav class="nav">
        <div class="nav-content">
            <div class="logo" onclick="navigate('/')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                </svg>
                Nimbus File
            </div>
            <div class="nav-actions">
                <a href="/docs" class="github-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span>Docs</span>
                </a>
                <a href="https://github.com/hakeroneh1/nimbus-file" target="_blank" class="github-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                    <span>GitHub</span>
                </a>
                <div id="auth-buttons"></div>
            </div>
        </div>
    </nav>

    <div class="container" id="app">
        <div id="content"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = window.location.origin;
        let state = { user: {{ user|tojson }}, role: 'user', path: '/', files: [], folders: [], loading: false };

        // SVG иконки
        const icons = {
            folder: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'svg', 'webp', 'ico'].includes(ext)) return icons.image;
            if (['mp4', 'avi', 'mkv', 'mov', 'webm'].includes(ext)) return icons.video;
            if (['mp3', 'wav', 'flac', 'ogg', 'm4a'].includes(ext)) return icons.audio;
            if (['js', 'ts', 'py', 'java', 'cpp', 'c', 'go', 'rs', 'php', 'html', 'css', 'json', 'xml', 'md'].includes(ext)) return icons.code;
            if (['zip', 'rar', '7z', 'tar', 'gz', 'bz2'].includes(ext)) return icons.archive;
            return icons.file;
        }

        async function apiCall(endpoint, options = {}) {
            try {
                const headers = {};
                // Не устанавливаем Content-Type для FormData (браузер установит автоматически)
                if (!(options.body instanceof FormData)) {
                    if (options.headers?.['Content-Type']) {
                        headers['Content-Type'] = options.headers['Content-Type'];
                    } else if (options.body && typeof options.body === 'string') {
                        headers['Content-Type'] = 'application/json';
                    }
                }
                
                const res = await fetch(`${API}${endpoint}`, {
                    ...options,
                    credentials: 'include',
                    headers: {
                        ...headers,
                        ...options.headers
                    }
                });
                if (!res.ok && res.status === 401 && !endpoint.includes('/login')) {
                    state.user = null;
                    render();
                    return null;
                }
                if (!res.ok) {
                    const error = await res.json().catch(() => ({ detail: res.statusText }));
                    throw new Error(error.detail || res.statusText);
                }
                // Для DELETE и PUT запросов без контента
                if (res.status === 200 && ['DELETE', 'PUT'].includes(options.method)) {
                    return await res.json().catch(() => ({ success: true }));
                }
                return await res.json();
            } catch (error) {
                console.error('API Error:', error);
                showToast('Ошибка: ' + error.message);
                return null;
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('upload-file');
            const files = fileInput.files;
            if (!files || files.length === 0) return;

            let fileListHtml = '<div style="display: flex; flex-direction: column; gap: 0.5rem;">';
            for (let i = 0; i < files.length; i++) {
                const size = (files[i].size / 1024 / 1024).toFixed(2);
                fileListHtml += `
                    <div style="display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; background: rgba(102, 126, 234, 0.1); border-radius: 8px;">
                        <span style="font-size: 1.2rem;">📄</span>
                        <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${files[i].name}</span>
                        <span style="opacity: 0.6; font-size: 0.85rem;">${size} MB</span>
                    </div>
                `;
            }
            fileListHtml += '</div>';

            showModal(`
                <div style="text-align: center;">
                    <div class="loading-spinner"></div>
                    <h3 style="margin-bottom: 1rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Загрузка файлов</h3>
                    <p style="opacity: 0.7; margin-bottom: 1rem;">Файлов: ${files.length}</p>
                    <div style="max-height: 250px; overflow-y: auto; margin: 1rem 0; padding: 0.5rem;">
                        ${fileListHtml}
                    </div>
                    <div class="progress" id="upload-progress">
                        <div class="progress-bar" style="width: 0%"></div>
                    </div>
                    <p id="upload-status" style="font-size: 0.85rem; opacity: 0.6;">Подготовка...</p>
                </div>
            `);

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }
            formData.append('path', state.path);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload', true);
            xhr.withCredentials = true;

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = (e.loaded / e.total) * 100;
                    document.querySelector('.progress-bar').style.width = percent + '%';
                    if (percent < 50) {
                        document.getElementById('upload-status').textContent = `📤 Загрузка ${percent.toFixed(0)}%`;
                    } else if (percent < 90) {
                        document.getElementById('upload-status').textContent = `🔐 Шифрование ${percent.toFixed(0)}%`;
                    } else {
                        document.getElementById('upload-status').textContent = `✨ Почти готово...`;
                    }
                }
            };

            xhr.onload = () => {
                hideModal();
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    showToast(`✅ Загружено ${response.count} из ${response.total} файлов`);
                    loadFiles();
                } else {
                    showToast('❌ Ошибка загрузки');
                }
            };

            xhr.onerror = () => {
                hideModal();
                showToast('❌ Ошибка сети');
            };

            xhr.send(formData);
        }

        async function saveTextFile(fileId) {
            const content = document.getElementById('text-editor').value;
            const file = state.files.find(f => f.id === fileId);
            if (!file) return;
            
            showModal(`
                <div style="text-align: center; padding: 2rem;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 1rem; opacity: 0.7;">Сохранение...</p>
                </div>
            `);

            // Сначала загружаем новый файл
            const formData = new FormData();
            const blob = new Blob([content], { type: 'text/plain' });
            formData.append('file', blob, file.name);
            formData.append('path', state.path);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload', true);
            xhr.withCredentials = true;
            
            xhr.onload = async () => {
                if (xhr.status === 200) {
                    // Удаляем старый файл
                    await apiCall(`/api/file/${fileId}`, { method: 'DELETE' });
                    hideModal();
                    showToast('Файл сохранен ✨');
                    loadFiles();
                }
            };
            
            xhr.onerror = () => {
                hideModal();
                showToast('Ошибка сохранения');
            };
            
            xhr.send(formData);
        }

                        ${icons.key}
                    </div>
                    <h3 style="margin-top: 1rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">API ключи</h3>
                </div>
            `;
            
            if (me.api_keys?.length) {
                me.api_keys.forEach(key => {
                    html += `
                        <div class="api-key">
                            <code style="flex: 1;">${key}</code>
                            <button class="btn btn-outline btn-icon" onclick="deleteApiKey('${key}')" title="Удалить">
                                ${icons.trash}
                            </button>
                        </div>
                    `;
                });
            } else {
                html += '<p style="opacity: 0.7; margin: 1rem 0; text-align: center;">Нет API ключей</p>';
            }

            html += `
                <div style="margin-top: 1.5rem;">
                    <input type="text" id="api-key-name" placeholder="Название ключа" style="margin-bottom: 1rem;">
                    <div class="modal-actions" style="justify-content: center;">
                        <button class="btn btn-primary" onclick="createApiKey()">
                            ${icons.check}
                            <span>Создать</span>
                        </button>
                        <button class="btn btn-outline" onclick="hideModal()">Закрыть</button>
                    </div>
                </div>
            `;

            showModal(html);
        }

        async function loadUsers() {
            if (state.role !== 'admin') {
                showToast('Только для администраторов');
                return;
            }

            const data = await apiCall('/api/admin/users');
            if (!data) return;

            let html = `
                <div style="text-align: center; margin-bottom: 1.5rem;">
                    <div style="width: 64px; height: 64px; margin: 0 auto; background: rgba(102, 126, 234, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        ${icons.key}
                    </div>
                    <h3 style="margin-top: 1rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Пользователи</h3>
                </div>
            `;

            if (data.users?.length) {
                data.users.forEach(u => {
                    const roleBadge = u.role === 'admin' 
                        ? '<span style="background: rgba(237, 137, 54, 0.2); color: #ed8936; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">admin</span>'
                        : '<span style="background: rgba(102, 126, 234, 0.2); color: var(--primary); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">user</span>';
                    
                    html += `
                        <div class="api-key">
                            <div style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                                <span style="font-weight: 600;">${u.username}</span>
                                ${roleBadge}
                                <span style="opacity: 0.6; font-size: 0.8rem;">${u.api_keys_count} API ключей</span>
                            </div>
                            ${u.username !== 'admin' ? `
                            <button class="btn btn-outline btn-icon" onclick="deleteUser('${u.username}')" title="Удалить">
                                ${icons.trash}
                            </button>
                            ` : ''}
                        </div>
                    `;
                });
            }

            html += `
                <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                    <h4 style="margin-bottom: 1rem;">Создать пользователя</h4>
                    <input type="text" id="new-username" placeholder="Логин" style="margin-bottom: 0.5rem;">
                    <input type="password" id="new-password" placeholder="Пароль" style="margin-bottom: 0.5rem;">
                    <select id="new-role" style="margin-bottom: 1rem; padding: 0.75rem; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: var(--text);">
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                    </select>
                    <div class="modal-actions" style="justify-content: center;">
                        <button class="btn btn-primary" onclick="createUser()">
                            ${icons.check}
                            <span>Создать</span>
                        </button>
                        <button class="btn btn-outline" onclick="hideModal()">Закрыть</button>
                    </div>
                </div>
            `;

            showModal(html);
        }

        async function createUser() {
            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!username || !password) {
                showToast('Введите логин и пароль');
                return;
            }

            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            formData.append('role', role);

            const res = await fetch(`${API}/api/admin/create_user`, {
                method: 'POST',
                body: formData,
                credentials: 'include'
            });

            if (res.ok) {
                showToast('Пользователь создан ✨');
                loadUsers();
            } else {
                const error = await res.json().catch(() => ({ detail: 'Ошибка' }));
                showToast(error.detail || 'Ошибка создания');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Удалить пользователя ${username}?`)) return;

            const res = await fetch(`${API}/api/admin/delete_user/${username}`, {
                method: 'DELETE',
                credentials: 'include'
            });

            if (res.ok) {
                showToast('Пользователь удален');
                loadUsers();
            } else {
                const error = await res.json().catch(() => ({ detail: 'Ошибка' }));
                showToast(error.detail || 'Ошибка удаления');
            }
        }

        async function deleteApiKey(key) {
            await apiCall(`/api/key/${key}`, { method: 'DELETE' });
            loadApiKeys();
            showToast('API ключ удалён');
        }

        function navigate(path) {
            state.path = path;
            loadFiles();
        }

        function render() {
            const content = document.getElementById('content');
            const authButtons = document.getElementById('auth-buttons');

            if (!state.user) {
                authButtons.innerHTML = '';
                content.innerHTML = `
                    <div class="auth-card">
                        <h2>Nimbus File</h2>
                        <p class="subtitle">Безлимитное зашифрованное облачное хранилище</p>
                        <form id="login-form" onsubmit="event.preventDefault(); login()">
                            <div class="input-group">
                                <label>Логин</label>
                                <input type="text" name="username" required autocomplete="username">
                            </div>
                            <div class="input-group">
                                <label>Пароль</label>
                                <input type="password" name="password" required autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                                ${icons.cloud}
                                <span>Войти</span>
                            </button>
                        </form>
                        <div style="text-align: center; margin-top: 1.5rem; opacity: 0.6; font-size: 0.85rem;">
                            <div style="display: inline-flex; align-items: center; gap: 0.3rem;">
                                ${icons.lock}
                                <span>Все файлы шифруются AES-256</span>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            authButtons.innerHTML = `
                <div class="user-badge">
                    ${icons.cloud}
                    <span>${state.user}</span>
                    <span style="opacity: 0.6; font-size: 0.75rem;">(${state.role})</span>
                </div>
                ${state.role === 'admin' ? `
                <button class="btn btn-outline" onclick="loadUsers()">
                    ${icons.key}
                    <span>Пользователи</span>
                </button>
                ` : ''}
                <button class="btn btn-outline" onclick="loadApiKeys()">
                    ${icons.key}
                    <span>API</span>
                </button>
                <button class="btn btn-outline" onclick="logout()">
                    ${icons.logout}
                    <span>Выйти</span>
                </button>
            `;

            if (state.loading) {
                content.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Загрузка файлов...</p>
                    </div>
                `;
                return;
            }

            let breadcrumbs = state.path.split('/').filter(p => p);
            let breadcrumbHtml = '<div class="breadcrumb">';
            breadcrumbHtml += `<span class="breadcrumb-item" onclick="navigate('/')">${icons.home} Корень</span>`;
            let currentPath = '';
            breadcrumbs.forEach(crumb => {
                currentPath += '/' + crumb;
                breadcrumbHtml += `<span class="breadcrumb-item" onclick="navigate('${currentPath}')">${crumb}</span>`;
            });
            breadcrumbHtml += '</div>';

            let filesHtml = '<div class="file-grid">';

            state.folders.forEach(folder => {
                filesHtml += `
                    <div class="file-card" ondblclick="navigate('${state.path === '/' ? '' : state.path}/${folder.name}')">
                        <div style="color: var(--primary);">${icons.folder}</div>
                        <div class="file-name">${folder.name}</div>
                        <div class="file-size">Папка</div>
                        <div class="action-btns">
                            <button class="btn btn-outline btn-icon" onclick="event.stopPropagation(); deleteItem('${folder.id}', 'folder')" title="Удалить">
                                ${icons.trash}
                            </button>
                        </div>
                    </div>
                `;
            });

            state.files.forEach(file => {
                const canView = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'mp4', 'webm', 'ogg', 'mov', 'avi', 'mp3', 'wav', 'flac', 'm4a', 'txt', 'md', 'json', 'js', 'ts', 'py', 'java', 'c', 'cpp', 'go', 'rs', 'php', 'html', 'css', 'xml', 'yaml', 'yml', 'csv'].includes(file.name.split('.').pop().toLowerCase());
                
                filesHtml += `
                    <div class="file-card" ondblclick="${canView ? `openFile('${file.id}')` : ''}">
                        <div style="color: var(--primary);">${getFileIcon(file.name)}</div>
                        <div class="file-name">${file.name}</div>
                        <div class="file-size">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                        <div class="encryption-badge">${icons.lock} AES-256</div>
                        <div class="action-btns">
                            ${canView ? `<button class="btn btn-primary btn-icon" onclick="openFile('${file.id}')" title="Открыть">👁️</button>` : ''}
                            <button class="btn btn-primary btn-icon" onclick="shareFile('${file.id}')" title="Поделиться">
                                ${icons.share}
                            </button>
                            <button class="btn btn-outline btn-icon" onclick="window.open('/api/file/${file.id}/download')" title="Скачать">
                                ${icons.download}
                            </button>
                            <button class="btn btn-outline btn-icon" onclick="renameFile('${file.id}')" title="Переименовать">
                                ${icons.edit}
                            </button>
                            <button class="btn btn-outline btn-icon" onclick="deleteItem('${file.id}', 'file')" title="Удалить">
                                ${icons.trash}
                            </button>
                        </div>
                    </div>
                `;
            });

            if (state.folders.length === 0 && state.files.length === 0) {
                filesHtml = `
                    <div class="empty-state">
                        ${icons.cloud}
                        <p>Папка пуста</p>
                        <p style="font-size: 0.85rem; margin-top: 0.5rem; opacity: 0.6;">Загрузите первый файл</p>
                    </div>
                `;
            } else {
                filesHtml += '</div>';
            }

            content.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem;">
                    <h2 style="font-size: 1.4rem;">Файлы</h2>
                    <div class="header-actions">
                        <button class="btn btn-primary" onclick="showUploadModal()">
                            ${icons.upload}
                            <span>Загрузить</span>
                        </button>
                        <button class="btn btn-outline" onclick="showFolderModal()">
                            ${icons.folder}
                            <span>Папка</span>
                        </button>
                    </div>
                </div>
                ${breadcrumbHtml}
                ${filesHtml}
            `;
        }

        function showUploadModal() {
            showModal(`
                <div style="text-align: center;">
                    <h3 style="margin-bottom: 1rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Загрузить файлы</h3>
                    <div class="drop-zone" onclick="document.getElementById('upload-file').click()" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
                        ${icons.upload}
                        <p>Кликните или перетащите файлы сюда</p>
                        <p style="font-size: 0.85rem; opacity: 0.6; margin-top: 0.5rem;">Можно выбрать несколько файлов</p>
                    </div>
                    <input type="file" id="upload-file" style="display: none" onchange="uploadFile()" multiple>
                    <div class="modal-actions" style="justify-content: center;">
                        <button class="btn btn-outline" onclick="hideModal()">Закрыть</button>
                    </div>
                </div>
            `);
        }

        function handleDrop(event) {
            event.preventDefault();
            const files = event.dataTransfer.files;
            if (files && files.length > 0) {
                const input = document.getElementById('upload-file');
                input.files = files;
                uploadFile();
            }
        }

        function showFolderModal() {
            showModal(`
                <div style="text-align: center;">
                    <h3 style="margin-bottom: 1rem; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Создать папку</h3>
                    <input type="text" id="folder-name" placeholder="Название папки" style="margin-bottom: 1rem;">
                    <div class="modal-actions" style="justify-content: center;">
                        <button class="btn btn-primary" onclick="createFolder()">
                            ${icons.check}
                            <span>Создать</span>
                        </button>
                        <button class="btn btn-outline" onclick="hideModal()">Отмена</button>
                    </div>
                </div>
            `);
        }

        // Инициализация
        render();
        if (state.user) loadFiles();
    </script>
</body>
</html>
